groups:
  - name: queuestorm_alerts
    rules:
      - alert: HighTrafficAnomaly
        expr: rate(http_requests_total[1m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traffic spike detected ({{ $value }} req/s)"
          description: "Request rate exceeded 100 req/s for 5 minutes."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          /
          rate(http_requests_total[5m])
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate ({{ $value | humanizePercentage }})"
          description: "Error rate exceed 5% over 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency ({{ $value }}s)"
          description: "p99 latency exceed 5s over 5 minutes."
