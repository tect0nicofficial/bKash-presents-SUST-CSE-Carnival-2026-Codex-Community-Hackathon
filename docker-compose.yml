services:
  api:
    build: .
    env_file: .env
    networks:
      - app_net
    deploy:
      replicas: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
